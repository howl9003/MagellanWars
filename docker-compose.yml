version: "3.8"

name: vibespace

services:
  db:
    image: mysql:5.7
    command: >
      --sql-mode=""
      --character-set-server=latin1
      --collation-server=latin1_swedish_ci
      --innodb-buffer-pool-size=128M
      --key-buffer-size=32M
      --max-connections=50
      --tmp-table-size=32M
      --max-heap-table-size=32M
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: Archspace2
      MYSQL_USER: archspace
      MYSQL_PASSWORD: ${DB_PASSWORD:-archspace}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uarchspace", "-p${DB_PASSWORD:-archspace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  archspace:
    build: .
    restart: always
    environment:
      DB_HOST: db
      DB_USER: archspace
      DB_PASS: ${DB_PASSWORD:-archspace}
      DB_NAME: Archspace2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./archspace.config:/etc/archspace/archspace.config:ro
      - archspace_logs:/var/log/archspace
      - ./encyclopedia_data:/var/archspace/web/encyclopedia

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    restart: always
    # No longer exposed directly — nginx handles ports 80/443
    environment:
      ARCHSPACE_HOST: archspace
      ARCHSPACE_PORT: 12345
      PROXY_PORT: 8080
      DB_HOST: db
      DB_USER: archspace
      DB_PASS: ${DB_PASSWORD:-archspace}
      DB_NAME: Archspace2
    volumes:
      - ./src/web:/var/archspace/web
      - ./encyclopedia_data:/var/archspace/web/encyclopedia
    depends_on:
      - archspace
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - proxy

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      --email admin@playvibespace.online
      --agree-tos --no-eff-email
      -d playvibespace.online -d www.playvibespace.online
      && trap exit TERM; while :; do
        certbot renew --quiet;
        sleep 12h & wait $!;
      done"

volumes:
  db_data:
  archspace_logs:
