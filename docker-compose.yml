version: "3.8"

name: vibespace

services:
  db:
    image: mysql:5.7
    command: >
      --sql-mode=""
      --character-set-server=latin1
      --collation-server=latin1_swedish_ci
      --innodb-buffer-pool-size=128M
      --key-buffer-size=32M
      --max-connections=50
      --tmp-table-size=32M
      --max-heap-table-size=32M
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: Archspace2
      MYSQL_USER: archspace
      MYSQL_PASSWORD: ${DB_PASSWORD:-archspace}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uarchspace", "-p${DB_PASSWORD:-archspace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  archspace:
    build: .
    restart: always
    # Port 12345 is internal only — not exposed to the internet
    environment:
      DB_HOST: db
      DB_USER: archspace
      DB_PASS: ${DB_PASSWORD:-archspace}
      DB_NAME: Archspace2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./archspace.config:/etc/archspace/archspace.config:ro
      - archspace_logs:/var/log/archspace
      # Bind-mount so the proxy can serve server-generated encyclopedia HTML
      # and we can pre-seed static files (e.g. encyclopedia.html index page)
      - ./encyclopedia_data:/var/archspace/web/encyclopedia

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    restart: always
    ports:
      - "${PROXY_BIND:-0.0.0.0}:${PROXY_LISTEN_PORT:-80}:8080"
    environment:
      ARCHSPACE_HOST: archspace
      ARCHSPACE_PORT: 12345
      PROXY_PORT: 8080
      DB_HOST: db
      DB_USER: archspace
      DB_PASS: ${DB_PASSWORD:-archspace}
      DB_NAME: Archspace2
    volumes:
      - ./src/web:/var/archspace/web
      # Same encyclopedia bind-mount so generated files are served by the proxy
      - ./encyclopedia_data:/var/archspace/web/encyclopedia
    depends_on:
      - archspace
      - db

volumes:
  db_data:
  archspace_logs:
