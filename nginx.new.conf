events {}

http {
    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name playvibespace.online www.playvibespace.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — routes API/WS to Fastify, everything else to React SPA
    server {
        listen 443 ssl;
        server_name playvibespace.online www.playvibespace.online;

        ssl_certificate     /etc/letsencrypt/live/playvibespace.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/playvibespace.online/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Fastify REST API
        location /api/ {
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Socket.IO WebSocket
        location /socket.io/ {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # React SPA (client container on port 80)
        location / {
            proxy_pass http://client:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
