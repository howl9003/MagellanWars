name: magellanwars-new

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: magellanwars
      POSTGRES_USER: magellan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-magellan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magellan -d magellanwars"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/howl9003/vibespace-server:latest
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://magellan:${DB_PASSWORD:-magellan}@postgres:5432/magellanwars
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a strong secret before starting the production server}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  client:
    image: ghcr.io/howl9003/vibespace-client:latest
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.new.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_healthy

volumes:
  postgres_data:
