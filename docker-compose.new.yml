name: magellanwars-new

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: magellanwars
      POSTGRES_USER: magellan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-magellan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magellan -d magellanwars"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://magellan:${DB_PASSWORD:-magellan}@postgres:5432/magellanwars
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.new.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - server
      - client

volumes:
  postgres_data:
