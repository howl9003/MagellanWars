name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Run TypeScript compilation outside Docker first so errors are visible
  compile:
    name: Compile TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared
        run: pnpm --filter @magellanwars/shared build

      - name: Generate Prisma client
        run: pnpm --filter @magellanwars/server db:generate

      - name: Build server
        run: pnpm --filter @magellanwars/server build

      - name: Build client
        run: pnpm --filter @magellanwars/client build

  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/vibespace-server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-client:
    name: Build client image
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/vibespace-client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
